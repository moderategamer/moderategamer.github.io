<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>

  <!-- GitHub Dark Markdown CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-dark.min.css">

  <!-- GitHub-style syntax highlighting -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">

  <style>
    body {
      background-color: #0d1117;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: row;
      min-height: 100vh;
      color: #c9d1d9;
    }

    nav {
      width: 260px;
      background: #161b22;
      border-right: 1px solid #30363d;
      padding: 20px;
      box-sizing: border-box;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    nav h2 {
      margin-top: 0;
      color: #58a6ff;
    }

    nav a {
      color: #c9d1d9;
      text-decoration: none;
    }

    nav a:hover {
      color: #58a6ff;
    }

    nav ul {
      list-style: none;
      padding-left: 10px;
    }

    nav li {
      margin: 6px 0;
    }

    .markdown-body {
      flex: 1;
      max-width: 900px;
      padding: 45px;
      margin: 0 auto;
    }
  </style>
</head>

<body>

<nav>
  <h2><a href="{{ '/' | relative_url }}">Moderate’s Blog</a></h2>
  
    <h3 style="text-align:center; margin-top:5px; color:#666;">
      Last updated: {{ page.date | default: site.time | date: "%B %d, %Y" }}
    </h3>

  <ul>
    <li><a href="{{ '/' | relative_url }}">Home</a></li>

    <!-- EF Core -->
    <li>
      <a href="{{ '/ef-core/' | relative_url }}"><strong>EF Core</strong></a>
      <ul>
        <li><a href="{{ '/ef-core/ef-core-model.html' | relative_url }}">Mental Model</a></li>
        <li><a href="{{ '/ef-core/dbcontext.html' | relative_url }}">DBContext</a></li>
        <li><a href="{{ '/ef-core/linq-sql.html' | relative_url }}">LINQ → SQL</a></li>
      </ul>
    </li>

    <!-- Add more topics manually -->
    <!--
    <li>
      <a href="/csharp/"><strong>C#</strong></a>
      <ul>
        <li><a href="/csharp/post1.html">Post 1</a></li>
      </ul>
    </li>
    -->
  </ul>

</nav>

<article class="markdown-body">
  {{ content }}
</article>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>hljs.highlightAll();</script>

</body>
</html>
